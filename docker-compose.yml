# NAS(Synology) 배포 — 대시보드(nginx) + Cloudflare 터널 2컨테이너
#   사용: sudo docker compose up -d --build
#   .env 에 CLOUDFLARE_TUNNEL_TOKEN=eyJ... 필요 (git 에 올리지 말 것)
services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: policy-web
    restart: unless-stopped
    # Tailscale 로 직접 볼 때: http://ys:8007
    # Cloudflare 터널만 쓸 거면 아래 ports 두 줄을 지워도 된다(터널은 컨테이너망으로 붙음).
    ports:
      - "8007:80"
    expose:
      - "80"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: policy-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
