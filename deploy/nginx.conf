server {
    listen 80;
    server_name _;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # 사내 과제이므로 검색엔진 색인 차단 (주소를 아는 사람만 접근)
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css text/plain application/javascript application/json image/svg+xml;

    # ⚠ location 안에서 add_header 를 쓰면 위 보안 헤더 상속이 끊긴다.
    #    캐시 제어는 expires 로만 한다 (expires -1 → Cache-Control: no-cache).
    location ~* \.(html|js|css|json)$ {
        expires -1;
    }

    location ~* \.(png|jpe?g|gif|svg|ico|woff2?)$ {
        expires 7d;
    }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # 배포 확인용 — 컨테이너 빌드 시각이 담긴 build.txt 는 이미지에 함께 굽는다
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
